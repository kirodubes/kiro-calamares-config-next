modules-search: [ local ]

instances:
- id: rootfs
  module:   unpackfs
  config:   unpackfs1.conf
  weight:   45
- id: choice
  module:   packages
  config:   packages.conf
  weight:   25

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs@rootfs
  - kiro_kernel
  - machineid
  - locale
  - keyboard
  - localecfg
  - luksbootkeyfile
  - luksopenswaphookcfg
  - fstab
  - networkcfg
  - kiro_before
  - kiro_remove_nvidia
  - chwd
  - initcpiocfg
  - kiro_plymouth
  - initcpio
  - hwclock
  - services-systemd
  - packages@choice
  - removeuser
  - users
  - displaymanager
  - kiro_ucode
  - grubcfg
  - bootloader
  - kiro_final
  - preservefiles
  - umount
- show:
  - finished

branding: kiro

prompt-install: true

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: false

hide-back-and-next-during-exec: false

quit-at-end: false
